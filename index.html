<style>
:root{--bg:#0b1120;--bg2:#111827;--bg3:#1e293b;--bg4:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:#1e293b;--primary:#10b981;--primary-glow:rgba(16,185,129,.15);--accent:#f59e0b;--danger:#ef4444;--card:#111827;--sidebar:#0b1120}
[data-theme="light"]{--bg:#f1f5f9;--bg2:#ffffff;--bg3:#e2e8f0;--bg4:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--border:#e2e8f0;--primary:#059669;--primary-glow:rgba(5,150,105,.1);--accent:#d97706;--danger:#dc2626;--card:#ffffff;--sidebar:#ffffff}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;transition:background .3s,color .3s}
h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
a{color:var(--primary);text-decoration:none;transition:opacity .2s}
a:hover{opacity:.8}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 16px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
input::placeholder,textarea::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:12px;font-weight:600;font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .25s;position:relative;overflow:hidden}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px var(--primary-glow)}
.btn-primary:active{transform:translateY(0)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:transparent;color:var(--text2);padding:8px 12px}
.btn-ghost:hover{color:var(--text);background:var(--bg3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.glass{background:rgba(17,24,39,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06)}
[data-theme="light"] .glass{background:rgba(255,255,255,.8);border:1px solid rgba(0,0,0,.06)}
.toast-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;animation:slideIn .3s ease;min-width:280px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.toast-success{background:#065f46;color:#a7f3d0;border:1px solid #10b981}
.toast-error{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
.toast-info{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px var(--primary-glow)}50%{box-shadow:0 0 40px var(--primary-glow),0 0 60px var(--primary-glow)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes typing-dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.animate-fade-up{animation:fadeUp .5s ease both}
.animate-fade-in{animation:fadeIn .4s ease both}
.animate-float{animation:float 3s ease-in-out infinite}
.delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}.delay-3{animation-delay:.3s}.delay-4{animation-delay:.4s}
.typing-indicator span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--primary);margin:0 2px;animation:typing-dot 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
.otp-input{width:50px;height:56px;text-align:center;font-size:22px;font-weight:700;border-radius:12px;padding:0}
.page-enter{animation:fadeUp .35s ease}
.chat-bubble-user{background:var(--primary);color:#fff;border-radius:18px 18px 4px 18px;padding:14px 18px;max-width:80%;line-height:1.6;word-wrap:break-word}
.chat-bubble-ai{background:var(--bg3);color:var(--text);border-radius:18px 18px 18px 4px;padding:14px 18px;max-width:85%;line-height:1.7;word-wrap:break-word}
.chat-bubble-ai p{margin-bottom:8px}.chat-bubble-ai p:last-child{margin-bottom:0}
.chat-bubble-ai code{background:rgba(0,0,0,.2);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'Courier New',monospace}
[data-theme="light"] .chat-bubble-ai code{background:rgba(0,0,0,.08)}
.chat-bubble-ai pre{background:rgba(0,0,0,.3);padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px;line-height:1.5}
[data-theme="light"] .chat-bubble-ai pre{background:rgba(0,0,0,.06)}
.chat-bubble-ai pre code{background:none;padding:0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--text2);font-size:14px}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg3);color:var(--text)}
.sidebar-item.active{border-left:3px solid var(--primary)}
.drop-zone{border:2px dashed var(--border);border-radius:16px;padding:40px;text-align:center;transition:all .3s;cursor:pointer}
.drop-zone.drag-over{border-color:var(--primary);background:var(--primary-glow)}
.voice-btn{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.voice-btn:hover{color:var(--primary);border-color:var(--primary)}
.voice-btn.recording{background:var(--danger);border-color:var(--danger);color:#fff;animation:pulse-glow 1.5s infinite}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:200px;overflow-y:auto;padding:8px}
.emoji-grid span{font-size:22px;padding:4px;cursor:pointer;border-radius:6px;text-align:center;transition:background .15s}
.emoji-grid span:hover{background:var(--bg3)}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--bg4);outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--primary);cursor:pointer;box-shadow:0 2px 8px var(--primary-glow)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;pointer-events:none}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
@media(max-width:768px){.otp-input{width:42px;height:48px;font-size:18px}.chat-bubble-user,.chat-bubble-ai{max-width:92%}}
.voice-hint{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.voice-btn.recording .voice-hint{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   CẤU HÌNH EMAILJS — GỬI OTP THẬT ĐẾN EMAIL
   ═══════════════════════════════════════════════════════════
   
   Hướng dẫn setup (chỉ cần làm 1 lần):
   
   1. Vào https://www.emailjs.com → Đăng ký tài khoản miễn phí
   2. Vào Email Services → Add New Service → chọn Gmail → Connect
   3. Vào Email Templates → Create New Template:
      - Subject: Mã OTP xác minh - TIO AI
      - Body: Xin chào,\n\nMã OTP xác minh tài khoản TIO AI của bạn là: {{otp_code}}\n\nMã có hiệu lực trong 5 phút. Không chia sẻ mã này với bất kỳ ai.\n\n— TIO AI
   4. Copy Service ID, Template ID, Public Key vào bên dưới:
*/
const EMAILJS_CONFIG = {
  publicKey: 'YOUR_EMAILJS_PUBLIC_KEY',    // ← Thay bằng key thật
  serviceId: 'YOUR_EMAILJS_SERVICE_ID',    // ← Thay bằng service ID thật
  templateId: 'YOUR_EMAILJS_TEMPLATE_ID'   // ← Thay bằng template ID thật
};

// Khởi tạo EmailJS (nếu có key thật)
if (EMAILJS_CONFIG.publicKey !== 'YOUR_EMAILJS_PUBLIC_KEY') {
  emailjs.init(EMAILJS_CONFIG.publicKey);
}

/* ═══════════════════════════════════════════
   TRẠNG THÁI ỨNG DỤNG
   ═══════════════════════════════════════════ */
const State = {
  user: JSON.parse(localStorage.getItem('tio_user') || 'null'),
  token: localStorage.getItem('tio_token') || null,
  chats: JSON.parse(localStorage.getItem('tio_chats') || '[]'),
  currentChatId: null,
  settings: JSON.parse(localStorage.getItem('tio_settings') || JSON.stringify({
    theme: 'dark', language: 'vi', model: 'gemini', temperature: 0.7, fontSize: 15
  })),
  otpCode: '',
  otpEmail: '',
  otpPurpose: 'verify',
  otpVerified: false, // Chỉ cho đăng nhập khi OTP đã verified
  adminData: JSON.parse(localStorage.getItem('tio_admin') || JSON.stringify({
    users: [{id:1,name:'Phan Đăng',email:'phandang2171984@gmail.com',role:'admin',created:'2025-01-15',status:'active'},{id:2,name:'Trần Thị B',email:'tranthib@email.com',role:'user',created:'2025-02-20',status:'active'},{id:3,name:'Lê Văn C',email:'levanc@email.com',role:'user',created:'2025-03-10',status:'banned'}],
    messages: 12450, chats: 3200, otps: 890, images: 4560
  }))
};

// Cờ đánh dấu: user có dùng mic không (quyết định AI có đọc giọng không)
let usedVoiceForThisMessage = false;

function saveState() {
  localStorage.setItem('tio_user', JSON.stringify(State.user));
  localStorage.setItem('tio_token', State.token);
  localStorage.setItem('tio_chats', JSON.stringify(State.chats));
  localStorage.setItem('tio_settings', JSON.stringify(State.settings));
  localStorage.setItem('tio_admin', JSON.stringify(State.adminData));
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', State.settings.theme);
}

/* ═══════════════════════════════════════════
   TIỆN ÍCH
   ═══════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
  t.innerHTML = `<i class="fas ${icons[type]}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = 'slideOut .3s ease forwards'; setTimeout(() => t.remove(), 300); }, 4000);
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
function formatDate(d) { return new Date(d).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function mockJWT() {
  const h = btoa(JSON.stringify({alg:'HS256',typ:'JWT'}));
  const p = btoa(JSON.stringify({id:State.user?.id,exp:Date.now()+86400000}));
  const s = btoa(Math.random().toString(36).substr(2,32));
  return `${h}.${p}.${s}`;
}

/* ═══════════════════════════════════════════
   GỬI OTP THẬT QUA EMAILJS
   ═══════════════════════════════════════════ */
async function sendRealOTP(email, otpCode) {

    const res = await fetch("http://localhost:3000/send-otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email
        })
    });

    const data = await res.json();

    if(data.success){
        toast("OTP đã gửi tới Gmail!", "success");
        return true;
    }

    toast(data.message, "error");
    return false;
}

/* ═══════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════ */
function navigate(path) { window.location.hash = path; }
function getRoute() { return window.location.hash.slice(1) || '/'; }

function router() {
  applyTheme();
  const route = getRoute();
  const app = document.getElementById('app');

  const publicRoutes = ['/', '/login', '/register', '/verify-otp', '/forgot-password'];
  if (!State.token && !publicRoutes.includes(route)) { navigate('/login'); return; }
  if (State.token && (route === '/login' || route === '/register' || route === '/' || route === '/verify-otp')) { navigate('/chat'); return; }

  const pages = {
    '/': renderLanding, '/login': renderLogin, '/register': renderRegister,
    '/verify-otp': renderVerifyOTP, '/forgot-password': renderForgotPassword,
    '/chat': renderChat, '/settings': renderSettings, '/profile': renderProfile, '/admin': renderAdmin
  };

  const renderer = pages[route];
  if (renderer) {
    app.innerHTML = renderer();
    app.querySelector('.page-enter')?.classList.add('page-enter');
    initPageScripts(route);
  } else { navigate('/chat'); }
}

function initPageScripts(route) {
  const inits = { '/login': initLogin, '/register': initRegister, '/verify-otp': initVerifyOTP, '/forgot-password': initForgotPassword, '/chat': initChat, '/settings': initSettings, '/profile': initProfile, '/admin': initAdmin };
  inits[route]?.();
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);

/* ═══════════════════════════════════════════
   HEADER CHUNG
   ═══════════════════════════════════════════ */

        <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('/chat')">
          <div style="width:30px;height:30px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-weight:800;font-size:14px;font-family:'Space Grotesk'">T</span></div>
          <span class="font-heading font-bold text-lg" style="color:var(--text)">${title || 'TIO AI'}</span>

          <div class="flex items-center gap-2 px-4 py-3" style="border-bottom:1px solid var(--border)">
            <div style="width:10px;height:10px;border-radius:50%;background:#ef4444"></div>

let otpCooldownInterval = null;

function startCooldown() {
  let sec = 60;
  const btn = document.getElementById('resendBtn');
  const cd = document.getElementById('resendCooldown');
  const secEl = document.getElementById('cooldownSec');
  if (btn) btn.disabled = true;
  if (cd) cd.classList.remove('hidden');
  clearInterval(otpCooldownInterval);
  otpCooldownInterval = setInterval(() => {
    sec--;
    if (secEl) secEl.textContent = sec;
    if (sec <= 0) {
      clearInterval(otpCooldownInterval);
      if (btn) btn.disabled = false;
      if (cd) cd.classList.add('hidden');
    }
  }, 1000);
}

function initVerifyOTP() {
  const inputs = document.querySelectorAll('.otp-input');
  const btn = document.getElementById('verifyBtn');

  inputs.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val;
      if (val && i < 5) inputs[i + 1].focus();
      btn.disabled = Array.from(inputs).map(x => x.value).join('').length < 6;
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
    });
    inp.addEventListener('paste', e => {
      e.preventDefault();
      const data = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      data.split('').forEach((ch, idx) => { if (inputs[idx]) inputs[idx].value = ch; });
      if (data.length >= 6) inputs[5].focus();
      btn.disabled = data.length < 6;
    });
  });

  // Bắt đầu đếm ngược cooldown
  startCooldown();

  document.getElementById('otpForm').addEventListener('submit', e => {
    e.preventDefault();
    const code = Array.from(inputs).map(x => x.value).join('');

    if (code !== State.otpCode) {
      toast('Mã OTP không chính xác!', 'error');
      inputs.forEach(inp => { inp.value = ''; inp.style.borderColor = 'var(--danger)'; });
      setTimeout(() => inputs.forEach(inp => inp.style.borderColor = ''), 1500);
      inputs[0].focus();
      return;
    }

    // OTP đúng — xử lý theo mục đích
    clearInterval(otpCooldownInterval);

    if (State.otpPurpose === 'verify') {
      // Đăng ký: tạo tài khoản
      const data = JSON.parse(sessionStorage.getItem('tio_reg_data') || 'null');
      if (!data) { toast('Phiên đăng ký đã hết hạn', 'error'); navigate('/register'); return; }

      State.user = {
        id: generateId(), name: data.name, email: data.email,
        role: 'user', created: new Date().toISOString(),
        avatar: null, tokenUsed: 0, subscription: 'Free'
      };
      State.token = mockJWT();
      // Thêm vào mock DB
      State.adminData.users.push({ id: State.adminData.users.length + 1, name: data.name, email: data.email, role: 'user', created: new Date().toISOString(), status: 'active' });
      saveState();
      sessionStorage.removeItem('tio_reg_data');
      toast('Tài khoản đã được tạo thành công!', 'success');
      navigate('/chat');

    } else if (State.otpPurpose === 'login') {
      // Đăng nhập: OTP đúng → cho vào
      const pw = sessionStorage.getItem('tio_login_pw');
      const found = State.adminData.users.find(u => u.email === State.otpEmail);
      if (!found) { toast('Email không tồn tại', 'error'); navigate('/login'); return; }

      State.user = {
        id: generateId(), name: found.name, email: found.email,
        role: found.role, created: found.created,
        avatar: null, tokenUsed: 0, subscription: 'Free'
      };
      State.token = mockJWT();
      saveState();
      sessionStorage.removeItem('tio_login_pw');
      toast('Đăng nhập thành công!', 'success');
      navigate('/chat');

    } else if (State.otpPurpose === 'forgot') {
      // Quên mật khẩu: hiện form đặt mật khẩu mới
      toast('Xác minh thành công! Đặt mật khẩu mới.', 'success');
      const form = document.getElementById('otpForm').parentElement;
      form.innerHTML = `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-2" style="color:var(--text2)">Mật khẩu mới</label>
            <input type="password" id="newPw" placeholder="Tối thiểu 6 ký tự" required minlength="6">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2" style="color:var(--text2)">Xác nhận mật khẩu mới</label>
            <input type="password" id="newPwConfirm" placeholder="Nhập lại mật khẩu" required minlength="6">
          </div>
          <button onclick="resetPassword()" class="btn btn-primary w-full" style="padding:14px"><i class="fas fa-key"></i> Đặt mật khẩu mới</button>
        </div>`;
    }
  });
}

async function resendOTP() {
  State.otpCode = generateOTP();

    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Gửi mã OTP';
    navigate('/verify-otp');
  });
}

function renderMessage(m) {
  if (m.role === 'user') {
    const voiceTag = m.usedVoice ? '<span class="text-xs opacity-70 block mt-1"><i class="fas fa-microphone"></i> Giọng nói</span>' : '';
    return `
    <div class="flex justify-end animate-fade-in">
      <div class="flex items-end gap-2 max-w-[80%]">
        ${m.image ? `<img src="${m.image}" class="rounded-xl max-h-40 mb-1" style="border:1px solid var(--border)">` : ''}
        <div class="chat-bubble-user">${escapeHtml(m.content)}${voiceTag}</div>
        <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold" style="background:var(--primary);color:#fff">${(State.user?.name || 'U')[0].toUpperCase()}</div>
      </div>
    </div>`;
  }
  return `
  <div class="flex justify-start animate-fade-in">
    <div class="flex items-end gap-2 max-w-[85%]">
      <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center" style="background:var(--primary-glow)"><span style="font-weight:800;font-size:14px;font-family:'Space Grotesk';color:var(--primary)">T</span></div>
      <div class="chat-bubble-ai" id="msg-${m.id}">${formatAIContent(m.content)}</div>
    </div>
  </div>`;
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function formatAIContent(text) {
  let h = escapeHtml(text);
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/\n/g, '<br>');
  return h;
}

/* ═══════════════════════════════════════════
   CHAT LOGIC
   ═══════════════════════════════════════════ */
let pendingImage = null;
let isStreaming = false;
let recognition = null;

function newChat() {

function selectChat(id) { State.currentChatId = id; saveState(); router(); }
function deleteChat(id) {

}

  if (name?.trim()) { c.title = name.trim(); saveState(); router(); }
}
function pinChat(id) {
  const c = State.chats.find(c => c.id === id); if (!c) return;
  c.pinned = !c.pinned; saveState(); toast(c.pinned ? 'Đã ghim' : 'Đã bỏ ghim', 'success'); router();
}
function shareChat(id) { toast('Link đã được sao chép!', 'success'); }
function toggleChatMenu(id) {
  document.querySelectorAll('[id^="menu-"]').forEach(m => { if (m.id !== `menu-${id}`) m.classList.add('hidden'); });
  document.getElementById(`menu-${id}`)?.classList.toggle('hidden');
}
function toggleSidebar() {
  const sb = document.getElementById('chatSidebar');
  if (sb.style.width === '0px') { sb.style.width = '280px'; }
  else { sb.style.width = '0px'; sb.style.overflow = 'hidden'; setTimeout(() => sb.style.overflow = '', 300); }
}
function sendSuggestion(text) { document.getElementById('chatInput').value = text; sendMessage(); }
function handleInputKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 150) + 'px'; }

function handleFileSelect(e) {
  const file = e.target.files[0]; if (!file) return;
  const valid = ['image/png','image/jpeg','image/webp','image/gif','application/pdf'];
  if (!valid.includes(file.type)) return toast('Định dạng không hỗ trợ', 'error');
  if (file.size > 10*1024*1024) return toast('File quá lớn (tối đa 10MB)', 'error');
  const r = new FileReader();
  r.onload = ev => { pendingImage = ev.target.result; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('previewImg').src = pendingImage; };
  r.readAsDataURL(file); e.target.value = '';
}
function clearImage() { pendingImage = null; document.getElementById('imagePreview').classList.add('hidden'); }
function toggleEmojiPicker() { document.getElementById('emojiPicker')?.classList.toggle('hidden'); }
function insertEmoji(e) { const i = document.getElementById('chatInput'); i.value += e; i.focus(); document.getElementById('emojiPicker')?.classList.add('hidden'); }

/* ═══════════════════════════════════════════
   VOICE — Chỉ khi dùng mic thì AI mới nói
   ═══════════════════════════════════════════ */
function startVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    return toast('Trình duyệt không hỗ trợ giọng nói', 'error');
  }
  const btn = document.getElementById('voiceBtn');
  btn.classList.add('recording');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'vi-VN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript;
    document.getElementById('chatInput').value = transcript;
  };
  recognition.onerror = () => { btn.classList.remove('recording'); toast('Lỗi nhận giọng nói', 'error'); };
  recognition.onend = () => {
    btn.classList.remove('recording');
    // Nếu có text sau khi thả mic → tự động gửi
    const text = document.getElementById('chatInput').value.trim();
    if (text) {
      usedVoiceForThisMessage = true; // ĐÁNH DẤU: dùng mic → AI sẽ nói
      sendMessage();
    }
  };
  recognition.start();
}

function stopVoice() {
  if (recognition) { recognition.stop(); recognition = null; }
  document.getElementById('voiceBtn')?.classList.remove('recording');
}

/* ═══════════════════════════════════════════
   SPEAK — Chỉ gọi khi usedVoiceForThisMessage = true
   ═══════════════════════════════════════════ */
function speakText(text) {
  if (!usedVoiceForThisMessage) return; // KHÔNG nói nếu user gõ text
  if (!('speechSynthesis' in window)) return;

  // Dừng phát trước đó nếu đang nói
  window.speechSynthesis.cancel();

  // Làm sạch text cho TTS
  let clean = text.replace(/\*\*/g, '').replace(/`/g, '').replace(/```[\s\S]*?```/g, ', code block,').replace(/#{1,6}\s/g, '');
  clean = clean.slice(0, 500); // Giới hạn độ dài để không nói quá lâu

  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'vi-VN';
  utter.rate = 1.0;
  utter.volume = 0.8;
  utter.pitch = 1.0;

  // Thử chọn giọng Việt
  const voices = window.speechSynthesis.getVoices();
  const viVoice = voices.find(v => v.lang.startsWith('vi'));
  if (viVoice) utter.voice = viVoice;

  window.speechSynthesis.speak(utter);

  // Reset cờ sau khi nói xong
  utter.onend = () => { usedVoiceForThisMessage = false; };
  utter.onerror = () => { usedVoiceForThisMessage = false; };
}

/* ═══════════════════════════════════════════
   SEND MESSAGE
   ═══════════════════════════════════════════ */
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text && !pendingImage) return;

  if (!State.currentChatId) newChat();
  const chat = State.chats.find(c => c.id === State.currentChatId);
  if (!chat) return;

  // Reset cờ voice cho tin nhắn này (đã set trong startVoice nếu dùng mic)
  // usedVoiceForThisMessage đã được set = true trong startVoice()

  const userMsg = {
    id: generateId(), role: 'user', content: text || '(đã gửi ảnh)',
    image: pendingImage || null, time: Date.now(),
    usedVoice: usedVoiceForThisMessage // Lưu để hiển thị tag
  };
  chat.messages.push(userMsg);

  if (chat.messages.length === 1 && text) {
    chat.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
  }

  input.value = ''; input.style.height = 'auto';
  clearImage();
  saveState();
  renderMessages(chat);
  scrollToBottom();
  showTyping();

  isStreaming = true;
  const response = await generateAIResponse(text, pendingImage);
  hideTyping();

  const aiMsg = { id: generateId(), role: 'assistant', content: '', time: Date.now() };
  chat.messages.push(aiMsg);
  saveState();
  renderMessages(chat);
  scrollToBottom();

  await streamText(aiMsg.id, response, chat);

  // Reset cờ sau khi hoàn thành
  const wasVoice = usedVoiceForThisMessage;
  usedVoiceForThisMessage = false;
  isStreaming = false;
}

function renderMessages(chat) {
  const container = document.getElementById('messagesContainer');
  document.getElementById('emptyChat')?.remove();
  let list = document.getElementById('messagesList');
  if (!list) { container.innerHTML = `<div class="max-w-3xl mx-auto px-4 py-6 space-y-6" id="messagesList"></div>`; list = document.getElementById('messagesList'); }
  list.innerHTML = chat.messages.map(m => renderMessage(m)).join('');
}

function showTyping() {
  const list = document.getElementById('messagesList'); if (!list) return;
  const div = document.createElement('div'); div.id = 'typingIndicator'; div.className = 'flex justify-start animate-fade-in';
  div.innerHTML = `<div class="flex items-end gap-2"><div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center" style="background:var(--primary-glow)"><span style="font-weight:800;font-size:14px;font-family:'Space Grotesk';color:var(--primary)">T</span></div><div class="chat-bubble-ai typing-indicator"><span></span><span></span><span></span></div></div>`;
  list.appendChild(div); scrollToBottom();
}
function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

async function streamText(msgId, text, chat) {
  const el = document.getElementById(`msg-${msgId}`); if (!el) return;
  let current = '';
  for (let i = 0; i < text.length; i++) {
    current += text[i];
    el.innerHTML = formatAIContent(current);
    if (i % 3 === 0) scrollToBottom();
    await new Promise(r => setTimeout(r, 15 + Math.random() * 20));
  }
  const msg = chat.messages.find(m => m.id === msgId);
  if (msg) msg.content = text;
  saveState(); scrollToBottom();

  // Chỉ nói khi user dùng mic
  speakText(text);
}

function scrollToBottom() { const c = document.getElementById('messagesContainer'); if (c) c.scrollTop = c.scrollHeight; }

/* ═══════════════════════════════════════════
   AI RESPONSE GENERATOR
   ═══════════════════════════════════════════ */
async function generateAIResponse(userText, image) {
  await new Promise(r => setTimeout(r, 500 + Math.random() * 1000));
  const text = (userText || '').toLowerCase();
  const model = State.settings.model;

  if (image) {
    if (text.includes('giải') || text.includes('toán') || text.includes('bài')) {

  }

  if (text.includes('cảm ơn') || text.includes('thanks')) {

  if (text.includes('ai là') && (text.includes('bạn') || text.includes('tio'))) {

  }

  const responses = [
    `Câu hỏi hay về "${userText.slice(0,40)}${userText.length>40?'...':''}":\n\n**Phân tích:**\n- Chủ đề này có nhiều khía cạnh đáng chú ý\n- Cần xem xét từ nhiều góc độ\n\nBạn có thể cho tôi thêm ngữ cảnh cụ thể để tôi trả lời chi tiết hơn không?`,
    `Tôi hiểu câu hỏi của bạn.\n\n**Tóm tắt:** Đây là chủ đề thú vị cần khai thác sâu.\n\n**Gợi ý:**\n1. Xem xét khía cạnh cơ bản\n2. Phân tích ứng dụng thực tế\n3. Đánh giá xu hướng phát triển\n\nHãy cho tôi biết bạn muốn tập trung vào điểm nào!`,
    `Cảm ơn câu hỏi! 🙌\n\nDựa trên hiểu biết của tôi (${model.toUpperCase()}):\n\n**Nhận xét:** Câu hỏi cho thấy bạn quan tâm đến chủ đề có chiều sâu.\n\n**Gợi ý:** Nếu có tài liệu cụ thể, gửi ảnh/PDF để tôi phân tích chính xác hơn!`
  ];
  return responses[Math.floor(Math.random() * responses.length)];
}

/* ═══════════════════════════════════════════
   CHAT INIT — Drag & Drop
   ═══════════════════════════════════════════ */
function initChat() {
  const main = document.querySelector('main'); if (!main) return;
  let dragCounter = 0;
  const dz = document.getElementById('dropZone');

  main.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dz?.classList.remove('hidden'); });
  main.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter === 0) dz?.classList.add('hidden'); });
  main.addEventListener('dragover', e => e.preventDefault());
  main.addEventListener('drop', e => {
    e.preventDefault(); dragCounter = 0; dz?.classList.add('hidden');
    const file = e.dataTransfer.files[0];
    if (file) {
      const valid = ['image/png','image/jpeg','image/webp','image/gif','application/pdf'];
      if (valid.includes(file.type)) {
        const r = new FileReader();
        r.onload = ev => { pendingImage = ev.target.result; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('previewImg').src = pendingImage; };
        r.readAsDataURL(file);
      } else { toast('Định dạng không hỗ trợ', 'error'); }
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.relative')) document.getElementById('emojiPicker')?.classList.add('hidden');
    if (!e.target.closest('.group')) document.querySelectorAll('[id^="menu-"]').forEach(m => m.classList.add('hidden'));
  });

  document.getElementById('chatInput')?.focus();
  scrollToBottom();

  // Load voices cho TTS
  if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
}

                <td class="px-5 py-3 font-medium" style="color:var(--text)">${u.name}</td>

                <td class="px-5 py-3"><span class="tag" style="background:${u.role==='admin'?'rgba(245,158,11,.1)':'var(--primary-glow)'};color:${u.role==='admin'?'var(--accent)':'var(--primary)'}">${u.role}</span></td>
                <td class="px-5 py-3"><span class="tag" style="background:${u.status==='active'?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};color:${u.status==='active'?'var(--primary)':'var(--danger)'}">${u.status==='active'?'Hoạt động':'Banned'}</span></td>
                <td class="px-5 py-3" style="color:var(--text2)">${formatDate(u.created)}</td>
                <td class="px-5 py-3"><div class="flex gap-1">
                  <button onclick="toggleUserStatus(${u.id})" class="btn-ghost btn-sm" style="color:${u.status==='active'?'var(--danger)':'var(--primary)'}"><i class="fas ${u.status==='active'?'fa-ban':'fa-check'}"></i></button>
                  <button onclick="deleteUser(${u.id})" class="btn-ghost btn-sm" style="color:var(--danger)"><i class="fas fa-trash"></i></button>
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function toggleUserStatus(id) {
  const u = State.adminData.users.find(u=>u.id===id);
  if (u) { u.status = u.status==='active'?'banned':'active'; saveState(); router(); toast(`Đã ${u.status==='active'?'mở khóa':'khóa'} ${u.name}`, 'success'); }
}
function deleteUser(id) { State.adminData.users = State.adminData.users.filter(u=>u.id!==id); saveState(); router(); toast('Đã xóa', 'success'); }
function initAdmin() {}

/* ═══════════════════════════════════════════
   KHỞI TẠO
   ═══════════════════════════════════════════ */
(function init() {
  if (State.chats.length === 0 && State.token) {
    State.chats = [{
      id: generateId(), title: 'Chào hỏi TIO AI',
      messages: [
        { id: generateId(), role: 'user', content: 'Xin chào TIO!', image: null, time: Date.now()-60000, usedVoice: false },
        { id: generateId(), role: 'assistant', content: 'Xin chào bạn! 👋\n\nTôi là TIO, trợ lý AI của bạn. Tôi có thể giúp bạn viết code, giải toán, dịch thuật, sáng tác nội dung và rất nhiều thứ khác.\n\nDùng mic 🎤 để tôi trả lời bằng giọng nói nhé!', time: Date.now()-30000 }
      ], created: Date.now()-60000, pinned: false
    }];
    State.currentChatId = State.chats[0].id;
    saveState();
  }
})();
</script>
